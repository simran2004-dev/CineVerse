server.port=8084
spring.application.name=notification-service

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Queue names
rabbitmq.queue.booking=booking.notification.queue
rabbitmq.exchange=cineverse.exchange
rabbitmq.routing.key.booking=booking.confirmed

# Mail Configuration (SMTP — configure for real use)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.cineverse.notification=DEBUG
