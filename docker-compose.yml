version: "3.9"

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: cineverse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: cineverse_auth,cineverse_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-pg-databases.sh:/docker-entrypoint-initdb.d/create-multiple-pg-databases.sh
    ports:
      - "5432:5432"
    networks:
      - cineverse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: cineverse-mongodb
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - cineverse-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: cineverse-redis
    ports:
      - "6379:6379"
    networks:
      - cineverse-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cineverse-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"  # RabbitMQ management UI
    networks:
      - cineverse-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Backend Microservices ───────────────────────────────────────────────────

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: cineverse-auth
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cineverse_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cineverse-net

  movie-service:
    build:
      context: ./backend/movie-service
      dockerfile: Dockerfile
    container_name: cineverse-movies
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/cineverse_movies
    ports:
      - "8082:8082"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - cineverse-net

  booking-service:
    build:
      context: ./backend/booking-service
      dockerfile: Dockerfile
    container_name: cineverse-booking
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cineverse_booking
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cineverse-net

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: cineverse-notifications
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8084:8084"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cineverse-net

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: cineverse-gateway
    environment:
      AUTH_SERVICE_URI: http://auth-service:8081
      MOVIE_SERVICE_URI: http://movie-service:8082
      BOOKING_SERVICE_URI: http://booking-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - movie-service
      - booking-service
    networks:
      - cineverse-net

  # ─── Frontend ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cineverse-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - cineverse-net

volumes:
  postgres_data:
  mongo_data:

networks:
  cineverse-net:
    driver: bridge
